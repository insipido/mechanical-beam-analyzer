<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mechanical Beam Analyzer</title>
  style.css
</head>
<body>

<h1>Mechanical Beam Analyzer</h1>

<div class="toolbar">
  <label>
    Units:
    <select id="units">
      <option value="SI">SI (m, N)</option>
      <option value="Imperial">Imperial (ft, lbf)</option>
    </select>
  </label>

  <button id="analyzeBtn">Analyze</button>
  <button id="resetBtn">Reset</button>

  <span id="status">Idle</span>
</div>

<div class="inputs">
  <label>Beam Length <input id="L" type="number" step="any"></label>
  <label>E (Pa) <input id="E" type="number" step="any"></label>
  <label>I (m⁴) <input id="I" type="number" step="any"></label>
</div>

<h3>Point Load</h3>
<div class="inputs">
  <label>P <input id="P" type="number" step="any"></label>
  <label>x <input id="Px" type="number" step="any"></label>
  <button id="addPointLoad">Add</button>
</div>

<h3>Distributed Load</h3>
<div class="inputs">
  <label>w <input id="w" type="number" step="any"></label>
  <label>x₁ <input id="x1" type="number" step="any"></label>
  <label>x₂ <input id="x2" type="number" step="any"></label>
  <button id="addDistLoad">Add</button>
</div>

<canvas id="beam" width="900" height="150"></canvas>
<canvas id="shear" width="900" height="150"></canvas>
<canvas id="moment" width="900" height="150"></canvas>

<pre id="output"></pre>

app.js>
</body>
</html>
