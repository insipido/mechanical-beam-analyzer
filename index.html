<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mechanical Beam Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mechanical Beam Analyzer</h1>

<div class="toolbar">
  <label>Units:</label>
  <select id="units">
    <option value="SI">SI (m, N)</option>
    <option value="Imperial">Imperial (ft, lbf)</option>
  </select>

  <button id="analyzeBtn">Analyze</button>
  <button id="resetBtn">Reset</button>
  <span id="status">Idle</span>
</div>

<div class="inputs">
  <label>Beam Length (m)</label><input id="L" value="3">
  <label>E (Pa)</label><input id="E" value="200000000000">
  <label>I (m⁴)</label><input id="I" value="0.00001">
</div>

<h3>Point Load</h3>
<div class="inputs">
  <label>P (N)</label><input id="P" value="50">
  <label>x (m)</label><input id="Px" value="1.5">
  <button id="addPointLoad">Add</button>
</div>

<h3>Distributed Load</h3>
<div class="inputs">
  <label>w (N/m)</label><input id="w" value="80">
  <label>x₁ (m)</label><input id="x1" value="1.8">
  <label>x₂ (m)</label><input id="x2" value="2.5">
  <button id="addDistLoad">Add</button>
</div>

<div id="loadsList"></div>

<canvas id="beam" width="900" height="220"></canvas>
<canvas id="shear" width="900" height="150"></canvas>
<canvas id="moment" width="900" height="150"></canvas>
<canvas id="deflection" width="900" height="150"></canvas>

<pre id="output"></pre>

<script src="mechanics.js"></script>
<script src="app.js"></script>

</body>
</html>
