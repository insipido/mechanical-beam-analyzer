<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Structural Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Structural Analyzer</h1>

<div class="toolbar">
  <label>
    Tool:
    <select id="tool">
      <option value="point">Point Load</option>
      <option value="distributed">Distributed Load</option>
    </select>
  </label>

  <label>
    Units:
    <select id="units">
      <option value="SI">SI (m, N)</option>
      <option value="Imperial">Imperial (ft, lbf)</option>
    </select>
  </label>

  <button id="analyze">Analyze</button>
  <button id="reset">Reset</button>

  <span id="status">Idle</span>
</div>

<div class="inputs">
  <label>Beam Length <input id="L" value="6"></label>
  <label>E (Pa) <input id="E" value="200000000000"></label>
  <label>I (m⁴) <input id="I" value="0.00001"></label>
</div>

<canvas id="beam" width="900" height="200"></canvas>
<canvas id="shear" width="900" height="150"></canvas>
<canvas id="moment" width="900" height="150"></canvas>

<pre id="output"></pre>

<script src="mechanics.js"></script>
<script src="app.js"></script>
</body>
</html>
