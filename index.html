<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Structural Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Structural Analyzer</h1>

<div class="toolbar">
  <label>
    Tool:
    <select id="toolSelect">
      <option value="node">Add Node</option>
      <option value="pointLoad">Add Point Load</option>
    </select>
  </label>

  <label>
    Units:
    <select id="unitSystem">
      <option value="SI">SI (m, N)</option>
      <option value="Imperial">Imperial (ft, lbf)</option>
    </select>
  </label>

  <button id="solveBtn">Solve</button>
  <button id="resetBtn">Reset</button>

  <span id="status">Idle</span>
</div>

<canvas id="canvas" width="900" height="400"></canvas>

<pre id="output"></pre>

<script src="app.js"></script>
</body>
