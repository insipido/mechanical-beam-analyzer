<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mechanical Structure Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mechanical Structure Analyzer</h1>

<div class="toolbar">
  <label>
    Tool:
    <select id="toolSelect">
      <option value="node">Add Node</option>
      <option value="beam">Add Beam</option>
      <option value="load">Add Point Load</option>
    </select>
  </label>

  <label>
    Units:
    <select id="unitSystem">
      <option value="SI">SI (m, N)</option>
      <option value="Imperial">Imperial (ft, lbf)</option>
    </select>
  </label>

  <button id="analyzeBtn">Analyze</button>
  <button id="resetBtn">Reset</button>

  <span id="status">Idle</span>
</div>

<canvas id="canvas" width="1000" height="450"></canvas>

<pre id="output"></pre>

<script src="mechanics.js"></script>
<script src="app.js"></script>

</body>
</html>
