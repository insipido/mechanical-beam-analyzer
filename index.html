<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mechanical Beam Analyzer</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Mechanical Beam Analyzer</h1>

<div class="toolbar">
  <label for="units">Units:</label>
  <select id="units">
    <option value="SI">SI (m, N)</option>
    <option value="Imperial">Imperial (ft, lbf)</option>
  </select>

  <button id="analyzeBtn">Analyze</button>
  <button id="resetBtn">Reset</button>

  <span id="status">Idle</span>
</div>

<div class="inputs">
  <label for="L">Beam Length (m)</label>
  <input id="L" type="number" value="6">

  <label for="E">Young’s Modulus E (Pa)</label>
  <input id="E" type="number" value="200000000000">

  <label for="I">Moment of Inertia I (m⁴)</label>
  <input id="I" type="number" value="0.00001">
</div>

<h3>Point Load</h3>
<div class="inputs">
  <label for="P">Magnitude (N)</label>
  <input id="P" type="number">

  <label for="Px">Position (m)</label>
  <input id="Px" type="number">

  <button id="addPointLoad">Add Point Load</button>
</div>

<h3>Distributed Load</h3>
<div class="inputs">
  <label for="w">Intensity (N/m)</label>
  <input id="w" type="number">

  <label for="x1">Start (m)</label>
  <input id="x1" type="number">

  <label for="x2">End (m)</label>
  <input id="x2" type="number">

  <button id="addDistLoad">Add Distributed Load</button>
</div>

<canvas id="beam" width="900" height="220"></canvas>
<canvas id="shear" width="900" height="150"></canvas>
<canvas id="moment" width="900" height="150"></canvas>
<canvas id="deflection" width="900" height="150"></canvas>

<pre id="output"></pre>

<!-- ✅ THESE MUST BE SCRIPT TAGS -->
<script src="mechanics.js"></script>
<script src="app.js"></script>

</body>
</html>
